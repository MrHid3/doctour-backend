<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: sans-serif; color: #333;">
<p style="color: black;">Doctour</p>
<p>Zostało stworzone dla ciebie konto. Kliknij w poniższy link, aby je aktywować.</p>
<p>
    <a th:href="${link}"
       style="display:inline-block;padding:12px 24px;background:#cc0000;color:#fff;border-radius:6px;text-decoration:none;">
        Aktywuj konto
    </a>
</p>
<p style="color:#666;font-size:13px;">
    Link wygasa w <span th:text="${expiryHours}">24</span> godziny.
    Jeżeli nie spodziewałeś/-aś się tego maila, zignoruj go.
</p>
</body>
</html>
